{% extends "base.html" %}

{% block title %}Editar Promoción{% endblock %}

{% block content %}

<div class="page-header">
    <h1><i class="fas fa-edit"></i> Editar Promoción</h1>
    <p>Modifica los datos de la promoción seleccionada.</p>
</div>

<div class="row justify-content-center">
    <div class="col-lg-8">

        <div class="card system-card">
            <div class="card-header bg-warning">
                <h5><i class="fas fa-tags"></i> Promoción: {{ promotion.codigo }}</h5>
            </div>

            <div class="card-body">
                <form method="POST">

                    <div class="mb-3">
                        <label class="form-label">Código</label>
                        <input
                            type="text"
                            class="form-control"
                            value="{{ promotion.codigo }}"
                            disabled
                        >
                        <small class="text-muted">El código no se puede modificar para no afectar ventas históricas.</small>
                    </div>

                    <div class="mb-3">
                        <label for="nombre" class="form-label">Nombre *</label>
                        <input
                            type="text"
                            class="form-control"
                            id="nombre"
                            name="nombre"
                            value="{{ promotion.nombre }}"
                            required
                        >
                    </div>

                    <div class="mb-3">
                        <label for="descripcion" class="form-label">Descripción</label>
                        <textarea
                            class="form-control"
                            id="descripcion"
                            name="descripcion"
                            rows="3"
                        >{{ promotion.descripcion or '' }}</textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="tipo_aplicacion" class="form-label">Tipo de aplicación *</label>
                            <select
                                class="form-select"
                                id="tipo_aplicacion"
                                name="tipo_aplicacion"
                                required
                                onchange="toggleProductField()"
                            >
                                <option value="monto" {% if promotion.tipo_aplicacion == 'monto' %}selected{% endif %}>
                                    Sobre el monto final
                                </option>

                                <option value="producto" {% if promotion.tipo_aplicacion == 'producto' %}selected{% endif %}>
                                    Sobre producto específico
                                </option>
                            </select>
                        </div>

                        <div class="col-md-6 mb-3" id="product-block">
                            <label for="codigo_producto" class="form-label">Producto</label>
                            <select class="form-select" id="codigo_producto" name="codigo_producto">
                                <option value="">Seleccione producto</option>
                                {% for product in products %}
                                <option value="{{ product.codigo }}"
                                    {% if promotion.codigo_producto == product.codigo %}selected{% endif %}>
                                    {{ product.nombre }} - {{ product.codigo }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="valor" class="form-label">Valor *</label>
                            <input
                                type="number"
                                step="0.01"
                                min="0.01"
                                class="form-control"
                                id="valor"
                                name="valor"
                                value="{{ promotion.valor }}"
                                required
                            >
                        </div>

                        <div class="col-md-4 mb-3">
                            <label for="compra_minima" class="form-label">Compra mínima</label>
                            <input
                                type="number"
                                step="0.01"
                                min="0"
                                class="form-control"
                                id="compra_minima"
                                name="compra_minima"
                                value="{{ promotion.compra_minima or 0 }}"
                            >
                        </div>

                        <div class="col-md-4 mb-3 d-flex align-items-end">
                            <div>
                                <div class="form-check mb-2">
                                    <input
                                        class="form-check-input"
                                        type="checkbox"
                                        id="es_porcentaje"
                                        name="es_porcentaje"
                                        {% if promotion.es_porcentaje %}checked{% endif %}
                                    >
                                    <label class="form-check-label" for="es_porcentaje">
                                        Es porcentaje
                                    </label>
                                </div>

                                <div class="form-check">
                                    <input
                                        class="form-check-input"
                                        type="checkbox"
                                        id="activo"
                                        name="activo"
                                        {% if promotion.activo %}checked{% endif %}
                                    >
                                    <label class="form-check-label" for="activo">
                                        Activa
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="fecha_inicio" class="form-label">Fecha inicio *</label>
                            <input
                                type="date"
                                class="form-control"
                                id="fecha_inicio"
                                name="fecha_inicio"
                                value="{{ promotion.fecha_inicio }}"
                                required
                            >
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="fecha_fin" class="form-label">Fecha fin *</label>
                            <input
                                type="date"
                                class="form-control"
                                id="fecha_fin"
                                name="fecha_fin"
                                value="{{ promotion.fecha_fin }}"
                                required
                            >
                        </div>
                    </div>

                    <button type="submit" class="btn btn-warning">
                        <i class="fas fa-save"></i> Actualizar
                    </button>

                    <a href="{{ url_for('promotions.list_promotions') }}" class="btn btn-secondary">
                        <i class="fas fa-times"></i> Cancelar
                    </a>

                </form>
            </div>
        </div>

    </div>
</div>

<script>
function toggleProductField() {
    const tipo = document.getElementById('tipo_aplicacion').value;
    const block = document.getElementById('product-block');
    const productSelect = document.getElementById('codigo_producto');

    if (tipo === 'producto') {
        block.style.display = 'block';
        productSelect.setAttribute('required', 'required');
    } else {
        block.style.display = 'none';
        productSelect.removeAttribute('required');
        productSelect.value = '';
    }
}

document.addEventListener('DOMContentLoaded', toggleProductField);
</script>

{% endblock %}
