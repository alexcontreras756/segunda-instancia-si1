{% extends "base.html" %}

{% block title %}Editar Cliente{% endblock %}

{% block content %}

<div class="page-header">
    <h1><i class="fas fa-user-edit"></i> Editar Cliente</h1>
    <p>Modificar los datos del cliente seleccionado.</p>
</div>

<div class="row justify-content-center">
    <div class="col-md-7">

        <div class="card system-card">
            <div class="card-header bg-warning">
                <h5><i class="fas fa-user"></i> Cliente: {{ client.nombre }}</h5>
            </div>

            <div class="card-body">

                <form method="POST">

                    <div class="mb-3">
                        <label class="form-label">CI</label>
                        <input
                            type="text"
                            class="form-control"
                            value="{{ client.ci }}"
                            disabled
                        >
                        <small class="text-muted">
                            El CI no se puede modificar.
                        </small>
                    </div>

                    <div class="mb-3">
                        <label for="nombre" class="form-label">Nombre Completo *</label>
                        <input
                            type="text"
                            class="form-control"
                            id="nombre"
                            name="nombre"
                            value="{{ client.nombre }}"
                            required
                        >
                    </div>

                    <div class="mb-3">
                        <label for="tipo_cliente" class="form-label">Tipo de Cliente *</label>
                        <select
                            class="form-select"
                            id="tipo_cliente"
                            name="tipo_cliente"
                            required
                        >
                            <option value="temporal" {% if client.tipo_cliente == 'temporal' %}selected{% endif %}>
                                Temporal
                            </option>

                            <option value="permanente" {% if client.tipo_cliente == 'permanente' %}selected{% endif %}>
                                Permanente
                            </option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">Correo electrónico</label>
                        <input
                            type="email"
                            class="form-control"
                            id="email"
                            name="email"
                            value="{{ client.correo_electronico or '' }}"
                        >
                    </div>

                    <div class="mb-3">
                        <label for="telefono" class="form-label">Teléfono</label>
                        <input
                            type="text"
                            class="form-control"
                            id="telefono"
                            name="telefono"
                            value="{{ client.telefono or '' }}"
                        >
                    </div>

                    <button type="submit" class="btn btn-warning">
                        <i class="fas fa-save"></i> Actualizar
                    </button>

                    <a href="{{ url_for('clients.list_clients') }}" class="btn btn-secondary">
                        <i class="fas fa-times"></i> Cancelar
                    </a>

                </form>

            </div>
        </div>

    </div>
</div>

{% endblock %}
